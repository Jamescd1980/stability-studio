# Style presets — pick by id from list_styles() or natural language (aliases).
# Pass checkpoint= to override any style.
#
# Model families (architecture, workflow, sampler guidance): see model_families below
# and MODEL-FAMILIES.md. Agents: call get_generation_context → style_readiness.

model_families:
  sdxl:
    label: "SDXL checkpoint"
    workflow: checkpoint_txt2img
    comfy_nodes:
      - CheckpointLoaderSimple
      - CLIPTextEncode
      - KSampler
      - VAEDecode
    prompt_style: "Comma tags and negative prompts work well. Quality tags optional."
    typical_defaults:
      steps: 28
      cfg: 6.0
      sampler: dpmpp_2m
      scheduler: karras
      width: 1024
      height: 1024
    requires:
      - role: checkpoint
        folder: checkpoints
        stability_matrix_folder: StableDiffusion
    common_errors:
      - "CLIP input invalid → checkpoint is Flux/Wan, not SDXL; switch architecture"
    vram_hint_gb: "8–12 typical at 1024²"

  sdxl_anime:
    extends: sdxl
    label: "SDXL anime / illustration"
    prompt_style: "masterpiece, best quality prefixes; avoid photorealistic in negatives"
    typical_defaults:
      sampler: euler_ancestral
      scheduler: normal
      cfg: 6.0

  sd15:
    label: "Stable Diffusion 1.5 checkpoint"
    workflow: checkpoint_txt2img
    comfy_nodes:
      - CheckpointLoaderSimple
      - CLIPTextEncode
      - KSampler
      - VAEDecode
    prompt_style: "Comma tags and negative prompts; native res often 512×768."
    typical_defaults:
      steps: 30
      cfg: 5.0
      sampler: dpmpp_2m_sde
      scheduler: karras
      width: 512
      height: 768
    requires:
      - role: checkpoint
        folder: checkpoints
        stability_matrix_folder: StableDiffusion
    common_errors:
      - "y is None / SDXL ControlNet on SD1.5 → use sd15 controlnets or switch to SDXL style"
      - "Do not use SDXL IP-Adapter or SDXL ControlNet with sd15 checkpoints"
    vram_hint_gb: "4–8 at 512×768"
    note: "SD 1.5 checkpoints removed from catalog — use juggernaut or miracle_nsfw for photoreal"

  pony_sdxl:
    extends: sdxl
    label: "Pony SDXL"
    prompt_style: "score_9, score_8_up, score_7_up prefix; score_6… in negatives (Civitai Pony grammar)"
    typical_defaults:
      cfg: 5.5
      sampler: dpmpp_2m
      scheduler: karras

  flux2_klein:
    label: "Flux.2 Klein"
    workflow: flux2_klein_txt2img
    comfy_nodes:
      - UNETLoader
      - CLIPLoader
      - VAELoader
      - CLIPTextEncode
      - EmptyFlux2LatentImage
      - Flux2Scheduler
      - CFGGuider
      - SamplerCustomAdvanced
      - VAEDecode
    prompt_style: "Short natural language (40–120 words). Long SDXL-style negatives mostly ignored."
    typical_defaults:
      steps: 20
      cfg: 3.5
      sampler: euler
      scheduler: simple
      width: 1024
      height: 1024
    requires:
      - role: unet
        folder: diffusion_models
        stability_matrix_folder: DiffusionModels
        note: "Single-file Klein checkpoints in StableDiffusion must also appear in DiffusionModels (copy or hard-link) for UNETLoader"
      - role: clip
        folder: text_encoders
        stability_matrix_folder: TextEncoders
        default: qwen_3_8b_fp8mixed.safetensors
        klein_4b_alt: qwen_3_4b.safetensors
      - role: vae
        folder: vae
        stability_matrix_folder: VAE
        default: full_encoder_small_decoder.safetensors
        klein_4b_alt: flux2-vae.safetensors
    common_errors:
      - "CLIP input invalid → do not use CheckpointLoaderSimple; use flux2_klein workflow"
      - "UNET not in list → hard-link checkpoint from StableDiffusion to DiffusionModels"
      - "easy fluxLoader IndexError → Miracle/Klein has no bundled CLIP; use native Flux2 nodes"
    vram_hint_gb: "12–16 for 9B nvfp4 at 1024²"

  wan_video:
    label: "Wan video (T2V / I2V)"
    workflow: ui_json_converted
    prompt_style: "Natural language; workflow-specific encode nodes (WanVideoTextEncode)"
    note: "Uses saved workflow JSON in Stability Matrix Data/Workflows. Asset manifest in wan_assets.py / WAN-ASSETS.md"
    requires:
      - role: workflow_json
        folder: workflows
      - role: diffusion_model
        folder: diffusion_models
      - role: text_encoder
        folder: text_encoders
      - role: vae
        folder: vae
    setup_notes:
      - "Set VHS_USE_IMAGEIO_FFMPEG=1 before starting ComfyUI for MP4 output"
      - "Default I2V catalog id i2v_5b — call check_wan_assets before first run"
      - "Optional LoRAs: check_wan_video_loras / download_wan_video_loras (studio/wan_video_loras.py)"
      - "PainterI2V motion: workflow_id=i2v_5b_painter or use_painter_i2v=true — install_painter_i2v_dependencies first"

# Four art "food groups" — pass food_group= to edit_image / generate_image
art_food_groups:
  anime:
    label: Anime
    default_style: ilustmix
    styles: [anime, ilustmix, animagine_xl, aom2]
    description: "ilustmix, Illustrious XL, Animagine XL 4.0, AbyssOrangeMix2 (SD 1.5)"
  fantasy:
    label: Fantasy art
    default_style: merged_dreams
    styles: [merged_dreams, pony]
    description: "Dreamy stylized portraits — Merged In Dreams, Pony Diffusion V6 XL"
    prompt_guide: >-
      Keep merged_dreams; steer with prompt only. Pony score prefix (score_9, score_8_up, score_7_up)
      then subject → action → environment → lighting → one style phrase.
      Fantasy tags: high fantasy illustration, ethereal atmosphere, magical glow, ornate armor,
      enchanted forest, volumetric light, painterly, dreamy. Negate score_6… in negative; avoid
      photorealistic unless you want a realism bleed. 40–80 words beats keyword dumps on SDXL/Pony.
  cyberpunk:
    label: Cyberpunk
    default_style: n4mik4
    styles: [n4mik4, juggernaut]
    description: "n4mik4 hero shots, neon sci-fi via prompt (use cyberpunk in prompt)"
  photoreal:
    label: Photorealistic
    default_style: juggernaut
    styles: [juggernaut, miracle_nsfw, realisian]
    description: "Cinematic SDXL (Juggernaut), Flux2 (miracle_nsfw), Realisian SD 1.5 portraits"

